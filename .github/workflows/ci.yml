name: CI

on:
  push:
  pull_request:

jobs:
  week1-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall services

      - name: Router smoke test
        run: python -m services.core.test_router

      - name: API smoke test
        run: python -c "from fastapi.testclient import TestClient; from services.core.main import app; c=TestClient(app); assert c.get('/').json()['status'] == 'running'; assert c.get('/health').json()['status'] == 'healthy'; r=c.post('/task', json={'workspace':'research','query':'Transformer quantization paper'}).json(); assert r['agent'] == 'paper_agent'; assert r['status'] == 'routed'"
