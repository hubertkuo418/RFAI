core:
  name: ResearchForge AI Lab
  router: services/core/router.py

workspaces:
  - name: research
    path: workspaces/research
    metadata: workspaces/research/workspace.json
  - name: course
    path: workspaces/course
    metadata: workspaces/course/workspace.json
  - name: hardware
    path: workspaces/hardware
    metadata: workspaces/hardware/workspace.json

memory:
  enabled: false

tools:
  mcp_enabled: true
